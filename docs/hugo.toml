baseURL = "https://francis.italypaleale.me/"
locale = "en-us"
title = "Francis"
disableKinds = ["rss"]

[module]
  #workspace = "../go.work"

  [[module.mounts]]
    source = "img"
    target = "assets/docs/img"

  [[module.imports]]
    path = "github.com/italypaleale/hugo-assets"

# Required for render hooks + unsafe HTML in markdown
[markup]
  [markup.highlight]
    # Use CSS classes (styled by main.css Chroma rules)
    noClasses = false
    # Fallback only; noClasses = false overrides this
    style = "github"
    lineNos = false
    lineNumbersInTable = false
    guessSyntax = true
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
        # Allow raw HTML in markdown content
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  description        = "The simple & low-maintenance Go distributed actor framework"
  github_url         = "https://github.com/ItalyPaleAle/francis"
  github_repo        = "https://github.com/ItalyPaleAle/francis"
  github_branch      = "main"
  PlausibleAnalytics = true

  [params.theme]
    scheme = "rust"
    icon_light = "icon-light.svg"
    icon_dark = "icon-dark.svg"
    favicon = "icon-light.svg"

# Taxonomy pages aren't needed for a docs site
[taxonomies]
