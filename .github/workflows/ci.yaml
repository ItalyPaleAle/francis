name: "CI Test"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GOLANGCI_LINT_VERSION: "v2.12.2"

permissions:
  contents: "read"

jobs:
  ci:
    runs-on: "ubuntu-latest"

    services:
      postgres:
        image: "postgres:17-alpine"
        env:
          POSTGRES_USER: "actors"
          POSTGRES_PASSWORD: "actors"
          POSTGRES_DB: "actors"
        ports:
          - "5432:5432"
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_POSTGRES_CONNSTRING: "postgres://actors:actors@localhost:5432/actors"
      TEST_STANDALONE_POSTGRES_CONNSTRING: "postgres://actors:actors@localhost:5432/actors"

    steps:
      - name: "Check out code"
        uses: actions/checkout@v6

      - name: "Set up Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Check Go dependency minimum age
        run: |
          go install github.com/fchimpan/gomod-age@09005169a4792ad1a4824e1fc6d85785d91cea36
          gomod-age

      - name: "Lint"
        uses: golangci/golangci-lint-action@v9
        with:
          version: "${{ env.GOLANGCI_LINT_VERSION }}"

      - name: "Test"
        run: |
          go test -v -tags unit ./...

      - name: "Integration tests"
        run: |
          go test -tags integration -v -count=1 -timeout 15m ./tests/integration/...
